<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>Villaggio Centrale — Sekai</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --serif:'Cormorant Garamond',serif;
  --jp:'Zen Kaku Gothic New',sans-serif;
  --gold:#e0b864;
  --cream:#f6ecd6;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1418;font-family:var(--jp);user-select:none;}
canvas{display:block;}

/* ══ CANVAS SCENA ══ */
#scene{position:fixed;inset:0;width:100%;height:100%;z-index:1;touch-action:none;cursor:grab;}
#scene:active{cursor:grabbing;}

/* ══ HUD ══ */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;}

#topbar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:linear-gradient(to bottom,rgba(8,12,18,.55),transparent);
  pointer-events:none;
}
.tb-left{display:flex;align-items:center;gap:14px;}
#village-name{
  font-family:var(--serif);font-style:italic;
  font-size:clamp(16px,2.4vw,22px);
  color:var(--cream);letter-spacing:.18em;
  text-shadow:0 2px 12px rgba(0,0,0,.7);
}
#clock{
  display:flex;align-items:center;gap:7px;
  font-family:var(--serif);font-size:13px;
  color:rgba(246,236,214,.78);letter-spacing:.15em;
  background:rgba(8,12,18,.32);
  padding:5px 12px;border-radius:20px;
  backdrop-filter:blur(6px);
}
.tb-right{display:flex;gap:9px;pointer-events:all;}
.hud-btn{
  width:42px;height:42px;border-radius:50%;
  background:rgba(8,12,18,.4);
  border:1px solid rgba(246,236,214,.18);
  color:var(--cream);font-size:17px;
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
.hud-btn:hover{
  background:rgba(224,184,100,.25);
  border-color:rgba(224,184,100,.6);
  transform:scale(1.08);
}

/* ══ MINIMAPPA LUOGHI ══ */
#places-bar{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  max-width:94vw;padding:8px 12px;
  background:rgba(8,12,18,.38);
  border:1px solid rgba(246,236,214,.1);
  border-radius:16px;
  backdrop-filter:blur(10px);
  pointer-events:all;
}
.place-chip{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;border-radius:12px;
  background:rgba(246,236,214,.04);
  border:1px solid transparent;
  cursor:pointer;transition:all .25s;
  white-space:nowrap;
}
.place-chip:hover{background:rgba(224,184,100,.16);border-color:rgba(224,184,100,.4);}
.place-chip .pc-icon{font-size:16px;}
.place-chip .pc-name{
  font-family:var(--serif);font-size:12px;
  color:rgba(246,236,214,.82);letter-spacing:.06em;
}

/* ══ TOOLTIP LUOGO (hover su scena) ══ */
#place-tip{
  position:fixed;z-index:20;pointer-events:none;
  background:rgba(10,14,20,.92);
  border:1px solid rgba(224,184,100,.35);
  border-radius:10px;padding:10px 14px;
  max-width:240px;opacity:0;transform:translateY(6px);
  transition:opacity .25s,transform .25s;
  backdrop-filter:blur(10px);
}
#place-tip.show{opacity:1;transform:translateY(0);}
#place-tip .pt-name{
  font-family:var(--serif);font-size:15px;color:var(--gold);
  letter-spacing:.08em;margin-bottom:3px;
}
#place-tip .pt-desc{
  font-family:var(--serif);font-style:italic;font-size:12px;
  color:rgba(246,236,214,.7);line-height:1.45;
}

/* ══ SCHEDA AVATAR ══ */
#avatar-card{
  position:fixed;z-index:30;
  top:50%;right:-420px;transform:translateY(-50%);
  width:min(360px,90vw);
  background:linear-gradient(165deg,rgba(22,26,34,.97),rgba(12,16,22,.98));
  border:1px solid rgba(224,184,100,.28);
  border-radius:16px;padding:0;
  box-shadow:-12px 0 50px rgba(0,0,0,.55);
  transition:right .45s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
  pointer-events:all;
}
#avatar-card.open{right:18px;}
@media(max-width:560px){
  #avatar-card{top:auto;bottom:-100%;right:50%;transform:translateX(50%);
    width:94vw;transition:bottom .45s cubic-bezier(.4,0,.2,1);}
  #avatar-card.open{bottom:90px;right:50%;}
}
.ac-head{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  padding:26px 20px 18px;
  background:linear-gradient(180deg,rgba(224,184,100,.1),transparent);
  border-bottom:1px solid rgba(224,184,100,.14);
}
.ac-close{
  position:absolute;top:12px;right:14px;
  background:transparent;border:none;color:rgba(246,236,214,.45);
  font-size:18px;cursor:pointer;transition:color .25s;
}
.ac-close:hover{color:var(--cream);}
#ac-avatar{width:96px;height:120px;margin-bottom:8px;}
#ac-name{
  font-family:var(--jp);font-size:21px;font-weight:500;
  color:var(--gold);letter-spacing:.12em;
  text-shadow:0 0 20px rgba(224,184,100,.3);
}
#ac-age{
  font-family:var(--serif);font-style:italic;font-size:13px;
  color:rgba(246,236,214,.5);letter-spacing:.1em;margin-top:2px;
}
.ac-body{padding:18px 22px 22px;display:flex;flex-direction:column;gap:16px;}
.ac-section .ac-label{
  font-family:var(--serif);font-size:10px;letter-spacing:.25em;
  color:rgba(224,184,100,.6);text-transform:uppercase;margin-bottom:7px;
}
.ac-phrase{
  font-family:var(--serif);font-style:italic;font-size:15px;
  color:rgba(246,236,214,.85);line-height:1.55;
  padding-left:12px;border-left:2px solid rgba(224,184,100,.35);
}
.ac-tags{display:flex;flex-wrap:wrap;gap:6px;}
.ac-tag{
  padding:4px 11px;border-radius:14px;
  background:rgba(224,184,100,.1);
  border:1px solid rgba(224,184,100,.22);
  font-family:var(--serif);font-size:12px;
  color:rgba(246,236,214,.8);letter-spacing:.04em;
}
.ac-story{
  font-family:var(--serif);font-size:13px;
  color:rgba(246,236,214,.68);line-height:1.6;
}
.ac-pet{
  display:flex;align-items:center;gap:8px;
  font-family:var(--serif);font-size:14px;
  color:rgba(246,236,214,.75);
}
.ac-pet .pet-emoji{font-size:22px;}

/* Interazioni */
.ac-actions{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding-top:4px;
}
.ac-act{
  display:flex;align-items:center;gap:8px;
  padding:11px 12px;border-radius:10px;
  background:rgba(246,236,214,.04);
  border:1px solid rgba(246,236,214,.1);
  font-family:var(--serif);font-size:13px;
  color:rgba(246,236,214,.82);letter-spacing:.04em;
  cursor:pointer;transition:all .22s;text-align:left;
}
.ac-act:hover{background:rgba(224,184,100,.14);border-color:rgba(224,184,100,.4);transform:translateY(-1px);}
.ac-act .act-ico{font-size:16px;}
.ac-act.full{grid-column:1/-1;}

/* Toast reazione */
#toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);
  z-index:40;opacity:0;pointer-events:none;
  background:rgba(10,14,20,.94);
  border:1px solid rgba(224,184,100,.4);
  border-radius:24px;padding:12px 24px;
  font-family:var(--serif);font-style:italic;font-size:14px;
  color:var(--cream);letter-spacing:.06em;
  backdrop-filter:blur(10px);
  transition:opacity .4s,transform .4s;
  box-shadow:0 8px 30px rgba(0,0,0,.5);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ LOADING ══ */
#loading{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;background:#0d1418;transition:opacity .8s;
}
#loading.hidden{opacity:0;pointer-events:none;}
.load-jp{font-family:var(--jp);font-size:54px;color:var(--gold);letter-spacing:.4em;text-indent:.4em;
  animation:pulse 2s ease-in-out infinite;}
.load-txt{font-family:var(--serif);font-style:italic;font-size:14px;color:rgba(246,236,214,.5);letter-spacing:.2em;}
@keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}

/* Back button */
#back-btn{
  position:absolute;top:14px;left:20px;pointer-events:all;
  display:none;align-items:center;gap:7px;
  padding:8px 16px;border-radius:20px;
  background:rgba(8,12,18,.4);border:1px solid rgba(246,236,214,.18);
  color:var(--cream);font-family:var(--serif);font-size:13px;letter-spacing:.12em;
  cursor:pointer;transition:all .3s;backdrop-filter:blur(8px);
}
#back-btn:hover{background:rgba(224,184,100,.2);border-color:rgba(224,184,100,.5);}
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div id="hud">
  <div id="topbar">
    <div class="tb-left">
      <button id="back-btn" onclick="goBack()">‹ Mappa</button>
      <div id="village-name">Villaggio Centrale</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;pointer-events:all;">
      <div id="clock"><span id="clock-icon">🌅</span><span id="clock-time">—</span></div>
      <div class="tb-right">
        <button class="hud-btn" onclick="toggleTimeFlow()" id="time-btn" title="Velocità tempo">⏩</button>
        <button class="hud-btn" onclick="recenterView()" title="Centra vista">◎</button>
      </div>
    </div>
  </div>

  <div id="places-bar"></div>
</div>

<div id="place-tip"></div>

<div id="avatar-card">
  <div class="ac-head">
    <button class="ac-close" onclick="closeAvatarCard()">✕</button>
    <svg id="ac-avatar" viewBox="0 0 100 130"></svg>
    <div id="ac-name"></div>
    <div id="ac-age"></div>
  </div>
  <div class="ac-body">
    <div class="ac-section"><div class="ac-label">Una frase sua</div><div class="ac-phrase" id="ac-phrase"></div></div>
    <div class="ac-section"><div class="ac-label">Passioni</div><div class="ac-tags" id="ac-passions"></div></div>
    <div class="ac-section"><div class="ac-label">La sua storia</div><div class="ac-story" id="ac-story"></div></div>
    <div class="ac-section"><div class="ac-label">Compagno</div><div class="ac-pet" id="ac-pet"></div></div>
    <div class="ac-section">
      <div class="ac-label">Interagisci</div>
      <div class="ac-actions">
        <button class="ac-act" onclick="interact('greet')"><span class="act-ico">🙋</span> Saluta</button>
        <button class="ac-act" onclick="interact('thank')"><span class="act-ico">🙏</span> Ringrazia</button>
        <button class="ac-act" onclick="interact('compliment')"><span class="act-ico">✨</span> Complimento</button>
        <button class="ac-act" onclick="interact('passion')"><span class="act-ico">💛</span> Passione</button>
        <button class="ac-act full" onclick="interact('visit')"><span class="act-ico">🚶</span> Visitate insieme un luogo</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="loading">
  <div class="load-jp">世界</div>
  <div class="load-txt">il villaggio si sta svegliando…</div>
</div>

<script src="village-data.js"></script>
<script src="village-engine.js"></script>
</body>
</html>
