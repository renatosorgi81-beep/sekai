<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sekai — Villaggio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Zen+Kaku+Gothic+New:wght@300&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#d4a853;--cream:#f5ead0;
  --serif:'Cormorant Garamond',serif;
  --jp:'Zen Kaku Gothic New',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;cursor:none;}

/* ── CANVAS SCENA ── */
#scene-canvas {
  position:fixed;inset:0;width:100%;height:100%;
  display:block;
}

/* ── CURSORE CUSTOM ── */
#cursor {
  position:fixed;z-index:9999;pointer-events:none;
  width:20px;height:20px;
  border:1.5px solid rgba(212,168,83,0.7);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:transform 0.1s ease, border-color 0.3s;
  mix-blend-mode:screen;
}
#cursor.clicking {
  transform:translate(-50%,-50%) scale(0.6);
  border-color:rgba(212,168,83,1);
}

/* ── HUD ── */
#hud {
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:linear-gradient(to bottom,rgba(0,0,0,.4),transparent);
  pointer-events:none;
}
.hud-left {
  display:flex;align-items:center;gap:12px;
}
.area-name {
  font-family:var(--serif);font-style:italic;
  font-size:clamp(14px,1.8vw,18px);
  color:rgba(245,234,208,.8);letter-spacing:.2em;
}
.hud-clock {
  font-family:var(--serif);font-size:12px;
  color:rgba(245,234,208,.45);letter-spacing:.15em;
}
.hud-right {
  display:flex;gap:10px;pointer-events:all;
}
.hud-btn {
  background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.15);
  border-radius:50%;width:38px;height:38px;
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
  transition:all .3s;color:white;
}
.hud-btn:hover {
  background:rgba(212,168,83,.2);
  border-color:rgba(212,168,83,.6);
  transform:scale(1.08);
}

/* ── PRESENZA UTENTI ── */
#presence-bar {
  position:fixed;bottom:80px;right:16px;z-index:100;
  display:flex;flex-direction:column;align-items:flex-end;gap:6px;
  pointer-events:none;
}
.presence-dot {
  display:flex;align-items:center;gap:7px;
  padding:5px 10px 5px 8px;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  animation:presenceFade .4s ease both;
}
@keyframes presenceFade {
  from{opacity:0;transform:translateX(10px);}
  to{opacity:1;transform:translateX(0);}
}
.presence-avatar-mini {
  width:22px;height:22px;border-radius:50%;
  overflow:hidden;border:1px solid rgba(212,168,83,.4);
  flex-shrink:0;
}
.presence-name {
  font-family:var(--serif);font-size:11px;
  color:rgba(245,234,208,.65);letter-spacing:.08em;
  white-space:nowrap;
}
.presence-you {
  color:rgba(212,168,83,.8);
}

/* ── CHAT SUSSURRI ── */
#chat-panel {
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding:0 16px 16px;
  pointer-events:none;
}
#chat-messages {
  display:flex;flex-direction:column;gap:4px;
  margin-bottom:8px;max-height:120px;overflow:hidden;
}
.chat-msg {
  display:inline-flex;align-self:flex-start;
  padding:6px 12px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  font-family:var(--serif);font-size:12px;
  color:rgba(245,234,208,.8);
  letter-spacing:.06em;
  animation:msgIn .3s ease both;
  max-width:70vw;
}
.chat-msg .msg-author {
  color:var(--gold);margin-right:6px;
}
.chat-msg.system {
  color:rgba(245,234,208,.4);font-style:italic;
  background:transparent;border:none;
}
@keyframes msgIn {
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
#chat-input-row {
  display:flex;gap:8px;pointer-events:all;
  opacity:0;transition:opacity .3s;
}
#chat-input-row.visible { opacity:1; }
#chat-input {
  flex:1;padding:10px 16px;
  background:rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;
  color:var(--cream);
  font-family:var(--serif);font-size:13px;
  letter-spacing:.06em;
  outline:none;backdrop-filter:blur(8px);
  transition:border .3s;
}
#chat-input:focus { border-color:rgba(212,168,83,.5); }
#chat-input::placeholder { color:rgba(245,234,208,.25);font-style:italic; }
#chat-send {
  width:40px;height:40px;border-radius:50%;
  background:rgba(212,168,83,.2);
  border:1px solid rgba(212,168,83,.5);
  color:var(--gold);font-size:16px;cursor:pointer;
  transition:all .3s;flex-shrink:0;
}
#chat-send:hover {
  background:rgba(212,168,83,.35);
  transform:scale(1.08);
}

/* ── PROFILO POPUP ── */
#profile-popup {
  position:fixed;z-index:200;
  background:rgba(13,10,24,.96);
  border:1px solid rgba(212,168,83,.25);
  border-radius:8px;padding:16px;
  width:220px;
  backdrop-filter:blur(16px);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:none;
  animation:popupIn .25s ease both;
}
@keyframes popupIn {
  from{opacity:0;transform:scale(0.9) translateY(8px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}
.popup-avatar {
  display:flex;justify-content:center;margin-bottom:10px;
}
.popup-name {
  font-family:var(--jp);font-size:16px;color:var(--gold);
  letter-spacing:.25em;text-align:center;margin-bottom:4px;
}
.popup-personality {
  font-family:var(--serif);font-style:italic;font-size:11px;
  color:rgba(245,234,208,.45);letter-spacing:.1em;
  text-align:center;margin-bottom:12px;
}
.popup-tags {
  display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;
  justify-content:center;
}
.popup-tag {
  padding:3px 8px;
  background:rgba(212,168,83,.08);
  border:1px solid rgba(212,168,83,.2);
  border-radius:12px;
  font-family:var(--serif);font-size:10px;
  color:rgba(245,234,208,.6);
}
.popup-close {
  position:absolute;top:8px;right:10px;
  background:transparent;border:none;
  color:rgba(245,234,208,.3);font-size:16px;
  cursor:pointer;
}
.popup-close:hover { color:rgba(245,234,208,.8); }

/* ── NOTIFICA ENTRATA ── */
#join-toast {
  position:fixed;top:70px;left:50%;
  transform:translateX(-50%);
  z-index:150;pointer-events:none;
}
.toast {
  padding:8px 20px;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(8px);
  border:1px solid rgba(212,168,83,.2);
  border-radius:20px;
  font-family:var(--serif);font-style:italic;font-size:13px;
  color:rgba(245,234,208,.7);letter-spacing:.12em;
  animation:toastAnim 3s ease both;
  white-space:nowrap;
}
@keyframes toastAnim {
  0%{opacity:0;transform:translateY(-8px);}
  15%{opacity:1;transform:translateY(0);}
  75%{opacity:1;}
  100%{opacity:0;transform:translateY(-8px);}
}

/* ── LOADING ── */
#loading {
  position:fixed;inset:0;z-index:1000;
  background:#0d0a18;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;transition:opacity .8s ease;
}
#loading.fade { opacity:0;pointer-events:none; }
.loading-logo {
  font-family:var(--jp);font-size:48px;color:var(--gold);
  letter-spacing:.4em;text-indent:.4em;
  text-shadow:0 0 40px rgba(212,168,83,.4);
  animation:logoFloat 2s ease-in-out infinite;
}
@keyframes logoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.loading-text {
  font-family:var(--serif);font-style:italic;font-size:14px;
  color:rgba(245,234,208,.4);letter-spacing:.2em;
}
.loading-bar {
  width:200px;height:2px;
  background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden;
}
.loading-bar-fill {
  height:100%;background:var(--gold);border-radius:1px;
  animation:loadFill 1.5s ease forwards;
}
@keyframes loadFill{from{width:0;}to{width:100%;}}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">世界</div>
  <div class="loading-text">Villaggio Centrale</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<div id="cursor"></div>

<canvas id="scene-canvas"></canvas>

<div id="hud">
  <div class="hud-left">
    <span class="area-name">🏘️ Villaggio Centrale</span>
    <span class="hud-clock" id="world-clock">☀️ 08:00</span>
  </div>
  <div class="hud-right">
    <button class="hud-btn" id="chat-toggle-btn" onclick="toggleChat()" title="Chat">💬</button>
    <button class="hud-btn" onclick="window.parent?.postMessage({type:'BACK_TO_MAP'},\'*\')" title="Mappa">🗺️</button>
    <button class="hud-btn" onclick="openMyProfile()" title="Profilo">👤</button>
  </div>
</div>

<div id="presence-bar"></div>

<div id="chat-panel">
  <div id="chat-messages"></div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" maxlength="150"
      placeholder="Sussurra qualcosa al villaggio..."
      onkeydown="if(event.key==='Enter')sendWhisper()">
    <button id="chat-send" onclick="sendWhisper()">➤</button>
  </div>
</div>

<div id="profile-popup">
  <button class="popup-close" onclick="closeProfilePopup()">✕</button>
  <div class="popup-avatar">
    <svg id="popup-svg" viewBox="0 0 260 340" style="width:80px;height:104px;"></svg>
  </div>
  <div class="popup-name" id="popup-name"></div>
  <div class="popup-personality" id="popup-personality"></div>
  <div class="popup-tags" id="popup-tags"></div>
</div>

<div id="join-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sekai-db.js"></script>
<script>
'use strict';

// ══ CONFIG ══════════════════════════════════════
const SUPABASE_URL = 'https://oegkgicuigpcwoneradf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lZ2tnaWN1aWdwY3dvbmVyYWRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NjQ3OTQsImV4cCI6MjA5NjQ0MDc5NH0.rRaCqvdX5lmgEgZDjGutZHvnO2Bwy_vp5c-URZANyAE';
const MAX_INSTANCE_USERS = 50;
const AREA = 'village';

// ══ STATO ═══════════════════════════════════════
let currentUser = null;
let myAvatar = null;
let myInstance = 'village_001';
let otherUsers = new Map(); // userId → {x, direction, name, avatarSvg, ...}
let realtimeChannel = null;
let whisperChannel = null;
let worldTime = 0.3;
let frame = 0;
let chatVisible = false;

// ══ CANVAS & SCENE ══════════════════════════════
let canvas, ctx, W, H;

// ══ AVATAR LOCALE ═══════════════════════════════
const ME = {
  x: 0.5,          // 0-1 posizione orizzontale
  targetX: 0.5,
  direction: 'right',
  walking: false,
  walkCycle: 0,
  name: '',
  svgString: '',
};

// ══ INIT ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  canvas = document.getElementById('scene-canvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);

  // Cursore custom
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
  document.addEventListener('mouseup',   () => cursor.classList.remove('clicking'));

  // Carica sessione
  currentUser = SekaiDB.loadSession();
  if(!currentUser) {
    // Se aperto standalone senza login, usa dati demo
    currentUser = {
      id: 'demo-' + Math.random().toString(36).slice(2),
      username: 'Visitatore',
      avatar: { name:'Visitatore', personality:['Curioso'], svgString:'', code:'DEMO' }
    };
  }
  myAvatar = currentUser.avatar || {};
  ME.name = myAvatar.name || currentUser.username;
  ME.svgString = myAvatar.svgString || myAvatar.svgString || '';

  // Scegli istanza (con fallback in caso di errore)
  try {
    await joinInstance();
  } catch(e) {
    console.warn('joinInstance error:', e);
    myInstance = 'village_001';
    subscribeRealtime();
    subscribeWhispers();
  }

  // Avvia loop
  requestAnimationFrame(gameLoop);

  // Nasconde loading sempre — anche in caso di errori
  const hideLoading = () => {
    document.getElementById('loading').classList.add('fade');
    setTimeout(() => document.getElementById('loading').style.display='none', 800);
    showToast(`Benvenuto, ${ME.name} ✦`);
    document.getElementById('chat-input-row').classList.add('visible');
    updatePresenceBar();
  };
  setTimeout(hideLoading, 1500);
});

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// ══ ISTANZE ════════════════════════════════════
async function joinInstance() {
  // Conta utenti per istanza
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/world_presence?area=eq.${AREA}&select=instance`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }}
    );
    const rows = await res.json();

    // Conta per istanza
    const counts = {};
    rows.forEach(r => { counts[r.instance] = (counts[r.instance]||0)+1; });

    // Trova istanza con posto
    let chosen = 'village_001';
    let n = 1;
    while(true) {
      const key = `village_${String(n).padStart(3,'0')}`;
      if(!counts[key] || counts[key] < MAX_INSTANCE_USERS) {
        chosen = key; break;
      }
      n++;
    }
    myInstance = chosen;
  } catch(e) {
    myInstance = 'village_001';
  }

  // Registra presenza
  await upsertPresence();

  // Sottoscrivi Realtime
  subscribeRealtime();
  subscribeWhispers();

  // Carica utenti già presenti
  await loadPresence();
}

async function upsertPresence() {
  if(!currentUser?.id || currentUser.id.startsWith('demo-')) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/world_presence`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates,return=minimal',
      },
      body: JSON.stringify({
        user_id:    currentUser.id,
        username:   currentUser.username,
        avatar_name: ME.name,
        area:       AREA,
        instance:   myInstance,
        x:          ME.x,
        direction:  ME.direction,
        is_walking: ME.walking,
        updated_at: new Date().toISOString(),
      }),
    });
  } catch(e) {}
}

async function loadPresence() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/world_presence?area=eq.${AREA}&instance=eq.${myInstance}&select=*`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }}
    );
    const rows = await res.json();
    rows.forEach(r => {
      if(r.user_id === currentUser?.id) return;
      otherUsers.set(r.user_id, {
        x: r.x, direction: r.direction,
        name: r.avatar_name || r.username,
        walking: r.is_walking,
        walkCycle: Math.random()*Math.PI*2,
      });
    });
    updatePresenceBar();
  } catch(e) {}
}

// ══ REALTIME ════════════════════════════════════
function subscribeRealtime() {
  if(typeof window.supabase === 'undefined') return;

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  realtimeChannel = sb
    .channel(`presence_${myInstance}`)
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'world_presence',
      filter: `instance=eq.${myInstance}`,
    }, payload => {
      if(payload.eventType === 'DELETE') {
        const uid = payload.old?.user_id;
        if(uid && uid !== currentUser?.id) {
          const name = otherUsers.get(uid)?.name || 'qualcuno';
          otherUsers.delete(uid);
          updatePresenceBar();
          showToast(`${name} ha lasciato il villaggio`);
        }
        return;
      }
      const r = payload.new;
      if(!r || r.user_id === currentUser?.id) return;

      const existing = otherUsers.has(r.user_id);
      otherUsers.set(r.user_id, {
        x: r.x, direction: r.direction,
        name: r.avatar_name || r.username,
        walking: r.is_walking,
        walkCycle: otherUsers.get(r.user_id)?.walkCycle || Math.random()*Math.PI*2,
      });
      if(!existing) {
        updatePresenceBar();
        showToast(`${r.avatar_name || r.username} è entrato nel villaggio ✦`);
      }
    })
    .subscribe();
}

function subscribeWhispers() {
  if(typeof window.supabase === 'undefined') return;
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  whisperChannel = sb
    .channel(`whispers_${myInstance}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'whispers',
      filter: `instance=eq.${myInstance}`,
    }, payload => {
      const r = payload.new;
      if(r) addChatMessage(r.sender_name, r.message, r.sender_name === ME.name);
    })
    .subscribe();
}

// ══ MOVIMENTO ═══════════════════════════════════
canvas?.addEventListener('click', e => {
  const targetX = e.clientX / W;
  ME.targetX = Math.max(0.05, Math.min(0.95, targetX));
  ME.direction = ME.targetX > ME.x ? 'right' : 'left';
  ME.walking = true;
});

// Touch
canvas?.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const targetX = t.clientX / W;
  ME.targetX = Math.max(0.05, Math.min(0.95, targetX));
  ME.direction = ME.targetX > ME.x ? 'right' : 'left';
  ME.walking = true;
});

// Frecce tastiera
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft' || e.key === 'a') {
    ME.targetX = Math.max(0.05, ME.x - 0.15);
    ME.direction = 'left'; ME.walking = true;
  }
  if(e.key === 'ArrowRight' || e.key === 'd') {
    ME.targetX = Math.min(0.95, ME.x + 0.15);
    ME.direction = 'right'; ME.walking = true;
  }
});

// Pulizia alla chiusura
window.addEventListener('beforeunload', () => {
  if(!currentUser?.id || currentUser.id.startsWith('demo-')) return;
  navigator.sendBeacon(
    `${SUPABASE_URL}/rest/v1/world_presence?user_id=eq.${currentUser.id}`,
    JSON.stringify({})
  );
});

// ══ GAME LOOP ═══════════════════════════════════
let lastPresenceUpdate = 0;

function gameLoop(ts) {
  frame++;
  worldTime += 0.00012;
  if(worldTime > 1) worldTime = 0;

  // Muovi avatar locale
  const dx = ME.targetX - ME.x;
  if(Math.abs(dx) > 0.002) {
    ME.x += dx * 0.06;
    ME.walking = true;
    ME.walkCycle += 0.12;
  } else {
    ME.x = ME.targetX;
    ME.walking = false;
  }

  // Muovi walk cycle altri
  otherUsers.forEach(u => {
    if(u.walking) u.walkCycle = (u.walkCycle||0) + 0.08;
  });

  // Disegna scena
  drawScene();

  // Aggiorna presenza ogni 500ms
  if(ts - lastPresenceUpdate > 500) {
    lastPresenceUpdate = ts;
    upsertPresence();
  }

  requestAnimationFrame(gameLoop);
}

// ══ DISEGNO SCENA ════════════════════════════════
function drawScene() {
  const t = worldTime;
  const isNight  = t > 0.72 || t < 0.1;
  const isDawn   = t >= 0.1  && t < 0.2;
  const isDusk   = t >= 0.48 && t < 0.62;
  const lm = getLightMul(t);

  // ── CIELO ──
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H*0.62);
  const skyColors = getSkyColors(t, isNight, isDawn, isDusk);
  skyGrad.addColorStop(0, skyColors.top);
  skyGrad.addColorStop(1, skyColors.bot);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // ── SOLE / LUNA ──
  drawCelestial(t, isNight, isDawn, isDusk);

  // ── NUVOLE ──
  drawClouds(t, isNight, frame);

  // ── GOD RAYS (alba/tramonto) ──
  if(isDawn || isDusk) drawGodRays(t, isDawn);

  // ── COLLINE SFONDO ──
  drawHills(t, lm);

  // ── ALBERI SFONDO ──
  drawTreesBack(isNight, lm, frame);

  // ── CASE DEL VILLAGGIO ──
  drawVillageHouses(isNight, lm, frame);

  // ── TERRENO E PRATO ──
  drawGround(t, lm, frame);

  // ── FIORI ──
  drawFlowers(lm, frame);

  // ── ALTRI AVATAR ──
  otherUsers.forEach((user, uid) => {
    drawAvatar(user.x, user.name, user.direction, user.walkCycle||0, user.walking, false, uid);
  });

  // ── AVATAR LOCALE ──
  drawAvatar(ME.x, ME.name, ME.direction, ME.walkCycle, ME.walking, true, 'me');

  // ── PARTICELLE ──
  drawParticles(t, lm, frame);

  // ── VIGNETTE ──
  const vg = ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.9);
  vg.addColorStop(0,'transparent');
  vg.addColorStop(1,'rgba(0,0,0,.32)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);

  // ── NEBBIA NOTTURNA ──
  if(isNight) {
    const nf = ctx.createLinearGradient(0,H*.58,0,H*.75);
    nf.addColorStop(0,'transparent');
    nf.addColorStop(1,'rgba(15,10,35,.3)');
    ctx.fillStyle = nf; ctx.fillRect(0,H*.55,W,H*.45);
  }

  // ── OROLOGIO ──
  updateClock(t);
}

// ── Luce ──
function getLightMul(t) {
  if(t<.18) return .4+t*3;
  if(t<.5)  return .95;
  if(t<.72) return .95-(t-.5)*3;
  return .3+(t-.72)*.8;
}

// ── Colori cielo ──
function getSkyColors(t, isNight, isDawn, isDusk) {
  if(isNight) return { top:'#09061a', bot:'#16103a' };
  if(isDawn)  return { top:'#f0956e', bot:'#fde8c8' };
  if(isDusk)  return { top:'#e06030', bot:'#f0a060' };
  // Giorno
  const p = Math.min(1, (t-.2)/.28);
  return {
    top: lerpColor('#7ab8e8','#4a90c8',p),
    bot: lerpColor('#c8eaf8','#88c8e8',p),
  };
}

function lerpColor(a, b, t) {
  const p = s => parseInt(s.slice(1,3),16);
  const q = s => parseInt(s.slice(3,5),16);
  const r2 = s => parseInt(s.slice(5,7),16);
  const lerp = (x,y,t) => Math.round(x+(y-x)*t);
  return `rgb(${lerp(p(a),p(b),t)},${lerp(q(a),q(b),t)},${lerp(r2(a),r2(b),t)})`;
}

// ── Sole/Luna ──
function drawCelestial(t, isNight, isDawn, isDusk) {
  if(isNight) {
    // Luna
    const mx = W*.76, my = H*.14;
    const mg = ctx.createRadialGradient(mx,my,0,mx,my,60);
    mg.addColorStop(0,'rgba(255,245,200,.2)');mg.addColorStop(1,'transparent');
    ctx.fillStyle=mg; ctx.fillRect(mx-60,my-60,120,120);
    ctx.beginPath(); ctx.arc(mx,my,22,0,Math.PI*2);
    ctx.fillStyle='rgba(255,248,210,.95)'; ctx.fill();
    // Stelle
    for(let i=0;i<180;i++) {
      const sx=(Math.sin(i*137.5)*.5+.5)*W;
      const sy=(Math.cos(i*89.3)*.5+.5)*H*.65;
      const a=.3+.4*Math.sin(frame*.018+i*.7);
      ctx.beginPath(); ctx.arc(sx,sy,.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,220,${a})`; ctx.fill();
    }
  } else {
    // Sole
    const sp = isDusk?(t-.48)/.26 : t/.48;
    const sx = W*.15+sp*W*.7;
    const sy = H*.1+Math.pow(sp-.5,2)*H*.45;
    const sc = isDusk?'rgba(255,120,40,':'rgba(255,220,80,';
    const sg = ctx.createRadialGradient(sx,sy,0,sx,sy,80);
    sg.addColorStop(0,sc+'.3)'); sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg; ctx.fillRect(sx-80,sy-80,160,160);
    ctx.beginPath(); ctx.arc(sx,sy,isDusk?28:20,0,Math.PI*2);
    ctx.fillStyle=isDusk?'rgba(255,120,40,.95)':'rgba(255,230,100,.98)'; ctx.fill();
  }
}

// ── God Rays ──
function drawGodRays(t, isDawn) {
  const sx = isDawn ? W*.2 : W*.8;
  const sy = H*.12;
  ctx.save(); ctx.globalAlpha=.05;
  for(let r=0;r<5;r++) {
    const a = (r/5)*Math.PI*.6+Math.PI*.1;
    ctx.fillStyle='rgba(255,220,150,1)';
    ctx.beginPath(); ctx.moveTo(sx,sy);
    ctx.lineTo(sx+Math.cos(a-.06)*H*.9,sy+Math.sin(a-.06)*H*.9);
    ctx.lineTo(sx+Math.cos(a+.06)*H*.9,sy+Math.sin(a+.06)*H*.9);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// ── Nuvole ──
const cloudSeeds = Array.from({length:7},(_,i)=>({
  x: i*W/7, y: H*(.05+Math.sin(i*1.7)*.1),
  w: 150+i*30, h: 55+i*12,
  sp: .08+i*.04, a: .6+Math.sin(i)*.25,
}));
function drawClouds(t, isNight, f) {
  cloudSeeds.forEach(c => {
    c.x += c.sp; if(c.x>W+c.w) c.x=-c.w;
    ctx.save(); ctx.globalAlpha=c.a*(isNight?.22:.82);
    drawCloud(ctx,c.x,c.y,c.w,c.h,isNight);
    ctx.restore();
  });
}
function drawCloud(ctx,x,y,w,h,ni) {
  ctx.fillStyle=ni?'#9090aa':'#ffffff';
  const r=h/2;
  ctx.beginPath();
  ctx.arc(x+w*.28,y,r*.65,0,Math.PI*2);
  ctx.arc(x+w*.5,y-r*.28,r,0,Math.PI*2);
  ctx.arc(x+w*.72,y,r*.75,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath(); ctx.roundRect(x+w*.1,y,w*.8,r,r*.5); ctx.fill();
  if(!ni) {
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.beginPath(); ctx.ellipse(x+w*.42,y-r*.2,r*.35,r*.22,-.3,0,Math.PI*2); ctx.fill();
  }
}

// ── Colline ──
function drawHills(t, lm) {
  const baseY = H*.58;
  // Collina lontana
  const g1 = ctx.createLinearGradient(0,baseY-60,0,H);
  g1.addColorStop(0, lerpColor('#88b870','#4a6a3a', 1-lm));
  g1.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=g1; ctx.beginPath(); ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=6) {
    const y=baseY+Math.sin(x*.004+frame*.0001)*38+Math.sin(x*.009+frame*.00015)*18;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  // Collina media
  const g2 = ctx.createLinearGradient(0,baseY+10,0,H);
  g2.addColorStop(0, lerpColor('#70a858','#3a5028', 1-lm));
  g2.addColorStop(1,'rgba(0,0,0,.6)');
  ctx.fillStyle=g2; ctx.beginPath(); ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=6) {
    const y=baseY+42+Math.sin(x*.006+1.5)*28+Math.sin(x*.015+.8)*14;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
}

// ── Alberi sfondo ──
function drawTreesBack(isNight, lm, f) {
  const positions = [.04,.14,.24,.76,.86,.94];
  positions.forEach((xp,i) => {
    const tx=W*xp, ty=H*.62, th=H*.16+i%3*H*.04;
    // Tronco
    ctx.fillStyle='#3a2010';
    ctx.fillRect(tx-5,ty-th,10,th+6);
    // Chioma a più livelli
    [0,.3,.6].forEach((off,li) => {
      const sc=1-off*.25;
      const tg=ctx.createRadialGradient(tx,ty-th*(.5+off*.3),0,tx,ty-th*(.5+off*.3),th*.35*sc);
      tg.addColorStop(0,isNight?'#1a3020':'#4a8a40');
      tg.addColorStop(1,isNight?'#0a1810':'#2a6028');
      ctx.fillStyle=tg;
      ctx.beginPath();
      ctx.ellipse(tx+Math.sin(f*.002+li)*2,ty-th*(.5+off*.3),th*.3*sc,th*.28*sc,0,0,Math.PI*2);
      ctx.fill();
    });
    // Highlight luce
    if(!isNight) {
      ctx.save(); ctx.globalAlpha=.25;
      ctx.fillStyle='#a8e040';
      ctx.beginPath(); ctx.ellipse(tx-th*.1,ty-th*.72,th*.12,th*.08,-.4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  });
}

// ── Case del villaggio ──
function drawVillageHouses(isNight, lm, f) {
  const houses = [
    {x:.18,w:100,hh:80,c:'#c4a06a',rc:'#7a3820'},
    {x:.4, w:120,hh:95,c:'#b8906a',rc:'#6a3010'},
    {x:.62,w:105,hh:85,c:'#c8a870',rc:'#803a18'},
    {x:.82,w:90, hh:70,c:'#b89060',rc:'#703018'},
  ];
  houses.forEach(h => {
    const hx=W*h.x, by=H*.66;
    // Ombra casa
    ctx.save(); ctx.globalAlpha=.2;
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(hx,by+8,h.w*.5,10,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // Muri con gradiente
    const wg=ctx.createLinearGradient(hx-h.w/2,by-h.hh,hx+h.w/2,by);
    wg.addColorStop(0,lighten(h.c,15)); wg.addColorStop(1,h.c);
    ctx.fillStyle=wg;
    ctx.fillRect(hx-h.w/2,by-h.hh,h.w,h.hh+4);
    // Ombra lato dx
    ctx.fillStyle='rgba(0,0,0,.12)';
    ctx.fillRect(hx+h.w*.15,by-h.hh,h.w*.35,h.hh+4);
    // Tetto
    const rg=ctx.createLinearGradient(hx,by-h.hh-50,hx+h.w*.4,by-h.hh);
    rg.addColorStop(0,lighten(h.rc,20)); rg.addColorStop(1,h.rc);
    ctx.fillStyle=rg;
    ctx.beginPath();
    ctx.moveTo(hx-h.w*.62,by-h.hh);
    ctx.lineTo(hx,by-h.hh-50);
    ctx.lineTo(hx+h.w*.62,by-h.hh);
    ctx.closePath(); ctx.fill();
    // Cornicione
    ctx.fillStyle=darken(h.rc,10);
    ctx.fillRect(hx-h.w*.64,by-h.hh-3,h.w*1.28,7);
    // Finestre
    const wa=isNight?.92:.35;
    [[-.26,-.72],[.1,-.72],[-.26,-.42],[.1,-.42]].forEach(([ox,oy]) => {
      // Cornice
      ctx.fillStyle=darken(h.c,20);
      ctx.fillRect(hx+h.w*ox-1,by+h.hh*oy-1,h.w*.22,h.hh*.26);
      // Vetro
      const wfg=ctx.createLinearGradient(hx+h.w*ox,by+h.hh*oy,hx+h.w*ox+h.w*.2,by+h.hh*oy+h.hh*.24);
      if(isNight) {
        wfg.addColorStop(0,'rgba(255,220,100,.9)');
        wfg.addColorStop(1,'rgba(255,160,40,.7)');
      } else {
        wfg.addColorStop(0,'rgba(180,220,255,.7)');
        wfg.addColorStop(1,'rgba(140,190,240,.5)');
      }
      ctx.fillStyle=wfg;
      ctx.fillRect(hx+h.w*ox,by+h.hh*oy,h.w*.2,h.hh*.24);
      // Riflesso
      ctx.fillStyle='rgba(255,255,255,.35)';
      ctx.fillRect(hx+h.w*ox+2,by+h.hh*oy+2,h.w*.06,h.hh*.08);
    });
    // Porta
    ctx.fillStyle=darken(h.c,30);
    ctx.beginPath();
    ctx.arc(hx,by-8,h.w*.1,Math.PI,0);
    ctx.rect(hx-h.w*.1,by-8,h.w*.2,8);
    ctx.fill();
    // Luce porta (notte)
    if(isNight) {
      const lg=ctx.createRadialGradient(hx,by-6,0,hx,by-6,35);
      lg.addColorStop(0,'rgba(255,180,60,.4)'); lg.addColorStop(1,'transparent');
      ctx.fillStyle=lg; ctx.fillRect(hx-35,by-41,70,70);
    }
    // Camino con fumo
    ctx.fillStyle=darken(h.c,15);
    ctx.fillRect(hx+h.w*.2,by-h.hh-48,h.w*.12,h.hh*.55);
    for(let s=0;s<5;s++) {
      const sy2=by-h.hh-50-s*14;
      const sx2=hx+h.w*.26+Math.sin(frame*.02+s*.8)*8;
      ctx.beginPath(); ctx.arc(sx2,sy2,5+s*3,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,215,210,${.2-s*.035})`; ctx.fill();
    }
  });
}

// ── Terreno ──
function drawGround(t, lm, f) {
  const baseY = H*.66;
  // Prato principale
  const gg=ctx.createLinearGradient(0,baseY,0,H);
  gg.addColorStop(0,lerpColor('#88cc58','#3a5a28',1-lm));
  gg.addColorStop(.5,lerpColor('#70b040','#2a4a18',1-lm));
  gg.addColorStop(1,'rgba(0,0,0,.6)');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=5) {
    const y=baseY+Math.sin(x*.005+f*.0001)*22+Math.sin(x*.012)*12;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  // Sentiero di pietra
  const pathY = H*.7;
  ctx.fillStyle='rgba(190,165,120,.5)';
  ctx.beginPath();
  ctx.ellipse(W*.5,pathY,W*.35,18,0,0,Math.PI*2);
  ctx.fill();
  // Mattoni sentiero
  for(let i=-4;i<=4;i++) {
    ctx.fillStyle=`rgba(170,145,100,${.3+Math.sin(i)*.1})`;
    ctx.beginPath();
    ctx.ellipse(W*.5+i*W*.08,pathY,W*.035,7,.1*i,0,Math.PI*2);
    ctx.fill();
  }

  // Erba alta con vento
  ctx.strokeStyle='rgba(88,140,60,.45)'; ctx.lineWidth=1.2;
  for(let x=0;x<W;x+=16) {
    const gy=baseY+Math.sin(x*.005+f*.0001)*22;
    const sw=Math.sin(f*.003+x*.022)*10;
    ctx.beginPath();
    ctx.moveTo(x,gy+4);
    ctx.quadraticCurveTo(x+sw,gy-12,x+sw*1.6,gy-24);
    ctx.stroke();
  }

  // Strada in primo piano
  const rg=ctx.createLinearGradient(0,H*.82,0,H);
  rg.addColorStop(0,'rgba(150,130,90,.4)'); rg.addColorStop(1,'rgba(100,85,60,.2)');
  ctx.fillStyle=rg; ctx.fillRect(0,H*.82,W,H*.18);
}

// ── Fiori ──
const flowerData = Array.from({length:45},(_,i)=>({
  x:Math.random()*W, y:H*.68+Math.random()*H*.2,
  sz:3+Math.random()*8,
  col:['#ffb7c5','#ff9a9e','#ffd060','#fff0f8','#f8c8d4','#ffe0aa'][i%6],
  ph:Math.random()*Math.PI*2,
  sp:.004+Math.random()*.009,
}));
function drawFlowers(lm, f) {
  flowerData.forEach(fl => {
    fl.ph+=fl.sp;
    if(fl.y < H*.64) return;
    const sw=Math.sin(fl.ph)*2.5;
    ctx.save(); ctx.globalAlpha=.88*lm;
    ctx.translate(fl.x+sw,fl.y);
    ctx.strokeStyle='rgba(60,100,40,.6)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,fl.sz*2); ctx.stroke();
    for(let p=0;p<5;p++) {
      const a=(p/5)*Math.PI*2+fl.ph*.15;
      ctx.beginPath();
      ctx.ellipse(Math.cos(a)*fl.sz*.65,Math.sin(a)*fl.sz*.65,fl.sz*.48,fl.sz*.26,a,0,Math.PI*2);
      ctx.fillStyle=fl.col; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(0,0,fl.sz*.28,0,Math.PI*2);
    ctx.fillStyle='#fff8c0'; ctx.fill();
    ctx.restore();
  });
}

// ── Particelle ──
const particles = [];
function drawParticles(t, lm, f) {
  // Lucciole (sera/notte)
  const ffa = t>.65||t<.12 ? Math.min(1, t>.65?(t-.65)/.08:(0.12-t)/0.12) : 0;
  if(ffa > 0 && Math.random()<.04) {
    particles.push({type:'firefly',x:Math.random()*W,y:H*.4+Math.random()*H*.45,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.3,ph:Math.random()*Math.PI*2,r:1+Math.random()*2,life:1});
  }
  // Petali (giorno)
  if(!t>.65 && Math.random()<.025) {
    particles.push({type:'petal',x:Math.random()*W,y:-10,vx:(Math.random()-.5)*.8,vy:.4+Math.random()*.7,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.08,col:['#ffb7c5','#ffd060','#fff'][Math.floor(Math.random()*3)],a:.8,life:1});
  }
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    if(p.type==='firefly') {
      p.ph+=.04; p.x+=p.vx+Math.sin(p.ph)*.5; p.y+=p.vy+Math.cos(p.ph*.7)*.3;
      p.life-=.005;
      if(p.life<=0||p.x<0||p.x>W){particles.splice(i,1);continue;}
      const gl=.5+.5*Math.sin(p.ph*2);
      ctx.save(); ctx.globalAlpha=gl*ffa*.8;
      const fg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*6);
      fg.addColorStop(0,'rgba(200,255,150,.9)'); fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg; ctx.fillRect(p.x-p.r*6,p.y-p.r*6,p.r*12,p.r*12);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,255,180,${gl})`; ctx.fill();
      ctx.restore();
    } else if(p.type==='petal') {
      p.x+=p.vx+Math.sin(f*.01+i)*.4; p.y+=p.vy; p.rot+=p.rs; p.a-=.003;
      if(p.a<=0||p.y>H+10){particles.splice(i,1);continue;}
      ctx.save(); ctx.globalAlpha=p.a*lm;
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      const pg=ctx.createRadialGradient(0,0,0,0,0,6);
      pg.addColorStop(0,p.col); pg.addColorStop(1,p.col+'33');
      ctx.fillStyle=pg; ctx.beginPath(); ctx.ellipse(0,0,6,3.5,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

// ══ DISEGNO AVATAR ══════════════════════════════
function drawAvatar(xNorm, name, dir, walkCycle, walking, isMe, uid) {
  const x = xNorm * W;
  const groundY = H*.68 + Math.sin(xNorm*Math.PI*3+frame*.0001)*15;
  const scale = .8 + xNorm*.4; // prospettiva: più a dx = più grande
  const avatarH = H*.22 * scale;
  const avatarW = avatarH*.55;
  const cy = groundY - avatarH*.5;

  ctx.save();

  // Ombra
  ctx.globalAlpha=.18;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(x, groundY+4, avatarW*.6, avatarH*.08, 0,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=1;

  // Corpo — animazione camminata
  const walkOffset = walking ? Math.sin(walkCycle)*avatarH*.04 : 0;
  const legSwing   = walking ? Math.sin(walkCycle)*12*scale : 0;
  const armSwing   = walking ? Math.sin(walkCycle+Math.PI)*10*scale : 0;
  const bobY       = walking ? Math.abs(Math.sin(walkCycle))*(-avatarH*.02) : 0;

  const bodyY = groundY - avatarH + bobY;
  const flip  = dir === 'left' ? -1 : 1;

  // Recupera avatar data se disponibile
  const uData = uid === 'me' ? myAvatar : (otherUsers.get(uid) || {});
  const skin  = uData?.skin || '#f0c898';
  const cloth = uData?.clothColor || '#1a3a6a';
  const hair  = uData?.hairColor  || '#c8a020';
  const clothL = lighten(cloth, 25);

  // ── GAMBE ──
  const legY = bodyY + avatarH*.72;
  const legH = avatarH*.3;
  ctx.strokeStyle = darken(cloth, 10);
  ctx.lineWidth = avatarW*.28;
  ctx.lineCap = 'round';
  // Gamba sx
  ctx.beginPath();
  ctx.moveTo(x - avatarW*.15, legY);
  ctx.lineTo(x - avatarW*.15 - legSwing*.5, legY + legH);
  ctx.stroke();
  // Gamba dx
  ctx.beginPath();
  ctx.moveTo(x + avatarW*.15, legY);
  ctx.lineTo(x + avatarW*.15 + legSwing*.5, legY + legH);
  ctx.stroke();

  // ── CORPO ──
  const bodyGrad = ctx.createLinearGradient(x-avatarW*.45,bodyY+avatarH*.15,x+avatarW*.45,bodyY+avatarH*.7);
  bodyGrad.addColorStop(0, clothL);
  bodyGrad.addColorStop(1, cloth);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(x - avatarW*.45, bodyY + avatarH*.72);
  ctx.lineTo(x - avatarW*.35, bodyY + avatarH*.15);
  ctx.lineTo(x + avatarW*.35, bodyY + avatarH*.15);
  ctx.lineTo(x + avatarW*.45, bodyY + avatarH*.72);
  ctx.closePath();
  ctx.fill();

  // ── BRACCIA ──
  ctx.strokeStyle = skin;
  ctx.lineWidth = avatarW*.22;
  // Braccio sx
  ctx.beginPath();
  ctx.moveTo(x - avatarW*.35, bodyY + avatarH*.2);
  ctx.lineTo(x - avatarW*.55 + armSwing*flip, bodyY + avatarH*.52);
  ctx.stroke();
  // Braccio dx
  ctx.beginPath();
  ctx.moveTo(x + avatarW*.35, bodyY + avatarH*.2);
  ctx.lineTo(x + avatarW*.55 - armSwing*flip, bodyY + avatarH*.52);
  ctx.stroke();

  // ── COLLO ──
  ctx.fillStyle = skin;
  ctx.fillRect(x - avatarW*.1, bodyY + avatarH*.08, avatarW*.2, avatarH*.1);

  // ── TESTA ──
  const headR = avatarW*.55;
  const headCY = bodyY + avatarH*.02;
  const headGrad = ctx.createRadialGradient(x-headR*.2,headCY-headR*.2,2,x,headCY,headR*1.1);
  headGrad.addColorStop(0, lighten(skin,20));
  headGrad.addColorStop(1, skin);
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.ellipse(x, headCY, headR, headR*1.05, 0,0,Math.PI*2);
  ctx.fill();

  // Guance
  ctx.save(); ctx.globalAlpha=.15; ctx.fillStyle='#e05878';
  ctx.beginPath(); ctx.ellipse(x-headR*.55,headCY+headR*.18,headR*.3,headR*.18,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+headR*.55,headCY+headR*.18,headR*.3,headR*.18,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── OCCHI ──
  const eyeOff = headR*.38;
  const eyeW = headR*.28, eyeH = headR*.32;
  [-1,1].forEach(side => {
    const ex = x + side*eyeOff;
    const ey = headCY + headR*.05;
    ctx.fillStyle='rgba(255,255,255,.92)';
    ctx.beginPath(); ctx.ellipse(ex,ey,eyeW+1.5,eyeH+1.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = uData?.eyeColor || '#206040';
    ctx.beginPath(); ctx.ellipse(ex,ey,eyeW*.68,eyeH*.82,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a0a0a';
    ctx.beginPath(); ctx.ellipse(ex,ey,eyeW*.3,eyeH*.42,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.beginPath(); ctx.arc(ex-eyeW*.2,ey-eyeH*.25,eyeW*.18,0,Math.PI*2); ctx.fill();
    // Sopracciglia
    ctx.strokeStyle=darken(hair,15); ctx.lineWidth=1.8; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(ex-eyeW*.8,ey-eyeH-3);
    ctx.quadraticCurveTo(ex,ey-eyeH-5,ex+eyeW*.8,ey-eyeH-2);
    ctx.stroke();
  });

  // Bocca
  ctx.strokeStyle=darken(skin,30); ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x-headR*.22,headCY+headR*.4);
  ctx.quadraticCurveTo(x,headCY+headR*.52,x+headR*.22,headCY+headR*.4);
  ctx.stroke();

  // Naso
  ctx.strokeStyle=darken(skin,18); ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(x-headR*.08,headCY+headR*.18);
  ctx.quadraticCurveTo(x,headCY+headR*.3,x+headR*.08,headCY+headR*.18);
  ctx.stroke();

  // ── CAPELLI ──
  ctx.fillStyle = hair;
  ctx.beginPath();
  ctx.ellipse(x, headCY-headR*.5, headR*1.08, headR*.52, 0,Math.PI,0);
  ctx.fill();
  // Ciocche stile anime
  const hStyle = uData?.hair || 'wild';
  if(hStyle==='wild'||hStyle==='spiky') {
    [[-45,-22],[-25,-38],[-5,-45],[15,-42],[35,-28],[48,-12]].forEach(([ox,oy]) => {
      ctx.beginPath();
      ctx.ellipse(x+ox*scale,headCY+oy*scale,7*scale,16*scale,(ox/80)*Math.PI,0,Math.PI*2);
      ctx.fill();
    });
  } else if(hStyle==='long'||hStyle==='wavy') {
    [-1,1].forEach(s => {
      ctx.beginPath();
      ctx.moveTo(x+s*headR*.85,headCY);
      ctx.quadraticCurveTo(x+s*headR*1.1,headCY+avatarH*.4,x+s*headR*.9,headCY+avatarH*.8);
      ctx.strokeStyle=hair; ctx.lineWidth=headR*.7; ctx.lineCap='round'; ctx.stroke();
    });
  } else {
    // Short default
    ctx.beginPath();
    ctx.ellipse(x-headR*.85,headCY+headR*.1,headR*.2,headR*.32,-.25,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x+headR*.85,headCY+headR*.1,headR*.2,headR*.32,.25,0,Math.PI*2); ctx.fill();
  }
  // Highlight capelli
  ctx.save(); ctx.globalAlpha=.4; ctx.fillStyle=lighten(hair,35);
  ctx.beginPath(); ctx.ellipse(x-headR*.22,headCY-headR*.62,headR*.22,headR*.12,-.4,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── NOME ──
  const nameY = bodyY - headR*1.4 - 6;
  ctx.save();
  // Badge nome
  const nm = isMe ? `✦ ${name}` : name;
  ctx.font = `${Math.round(11*scale)}px 'Cormorant Garamond', serif`;
  const tw = ctx.measureText(nm).width;
  ctx.fillStyle = isMe ? 'rgba(212,168,83,.85)' : 'rgba(0,0,0,.5)';
  ctx.beginPath();
  ctx.roundRect(x-tw/2-8, nameY-14*scale, tw+16, 18*scale, 8);
  ctx.fill();
  ctx.fillStyle = isMe ? '#fff8d0' : 'rgba(245,234,208,.85)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(nm, x, nameY - 5*scale);
  ctx.restore();

  ctx.restore();

  // ── CLICK PER PROFILO (altri utenti) ──
  if(!isMe) {
    // Salva hitbox per click
    if(!window._avatarHitboxes) window._avatarHitboxes = [];
    window._avatarHitboxes.push({
      uid, x: x-avatarW, y: bodyY, w: avatarW*2, h: avatarH+20,
      name, data: otherUsers.get(uid),
    });
  }
}

// ── Colori utility ──
function lighten(hex, amt) {
  try {
    return `rgb(${Math.min(255,parseInt(hex.slice(1,3),16)+amt)},${Math.min(255,parseInt(hex.slice(3,5),16)+amt)},${Math.min(255,parseInt(hex.slice(5,7),16)+amt)})`;
  } catch(e){return hex;}
}
function darken(hex, amt){return lighten(hex,-amt);}

// ══ CLICK SU AVATAR ALTRUI ══════════════════════
canvas.addEventListener('click', e => {
  if(!window._avatarHitboxes || window._avatarHitboxes.length === 0) return;
  const hb = window._avatarHitboxes.find(h =>
    e.clientX>=h.x && e.clientX<=h.x+h.w &&
    e.clientY>=h.y && e.clientY<=h.y+h.h
  );
  if(hb) showProfilePopup(hb, e);
});

function showProfilePopup(hb, e) {
  const popup = document.getElementById('profile-popup');
  const d = hb.data || {};
  document.getElementById('popup-name').textContent = hb.name;
  document.getElementById('popup-personality').textContent =
    Array.isArray(d.personality) ? d.personality.slice(0,3).join(' · ') : '';
  const tagsEl = document.getElementById('popup-tags');
  const tags = [...(d.personality||[]).slice(0,2), ...(d.passions||[]).slice(0,2)];
  tagsEl.innerHTML = tags.map(t=>`<span class="popup-tag">${t}</span>`).join('');
  // SVG mini
  document.getElementById('popup-svg').innerHTML = d.svgString || `
    <circle cx="130" cy="170" r="110" fill="rgba(212,168,83,.08)" stroke="rgba(212,168,83,.2)" stroke-width="1"/>
    <text x="130" y="195" text-anchor="middle" font-family="serif" font-size="80" fill="rgba(212,168,83,.5)">${hb.name[0]?.toUpperCase()||'?'}</text>`;
  // Posiziona vicino al click
  const px = Math.min((e?.clientX||W/2) - 110, W-240);
  const py = Math.max(10, (e?.clientY||H/2) - 220);
  popup.style.left = px+'px';
  popup.style.top  = py+'px';
  popup.style.display = 'block';
}
function closeProfilePopup() {
  document.getElementById('profile-popup').style.display='none';
}

// ══ CHAT ════════════════════════════════════════
function toggleChat() {
  chatVisible = !chatVisible;
  const row = document.getElementById('chat-input-row');
  row.classList.toggle('visible', chatVisible);
  if(chatVisible) document.getElementById('chat-input').focus();
  document.getElementById('chat-toggle-btn').style.background =
    chatVisible ? 'rgba(212,168,83,.25)' : 'rgba(0,0,0,.3)';
}

async function sendWhisper() {
  const inp = document.getElementById('chat-input');
  const msg = inp.value.trim();
  if(!msg) return;
  inp.value = '';

  // Mostra subito lato locale
  addChatMessage(ME.name, msg, true);

  // Salva su Supabase
  if(!currentUser?.id?.startsWith('demo-')) {
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/whispers`, {
        method:'POST',
        headers:{
          apikey:SUPABASE_KEY,
          Authorization:`Bearer ${SUPABASE_KEY}`,
          'Content-Type':'application/json',
          Prefer:'return=minimal',
        },
        body:JSON.stringify({
          sender_id:   currentUser.id,
          sender_name: ME.name,
          area:        AREA,
          instance:    myInstance,
          message:     msg,
        }),
      });
    } catch(e){}
  }
}

function addChatMessage(author, text, isMe) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg' + (isMe?' you':'');
  div.innerHTML = `<span class="msg-author">${author}</span>${text}`;
  container.appendChild(div);
  // Mantieni ultimi 5 messaggi
  while(container.children.length > 5) container.removeChild(container.firstChild);
  // Auto-scroll
  div.scrollIntoView({behavior:'smooth',block:'end'});
  // Auto-sparisce dopo 8s
  setTimeout(() => {
    div.style.transition='opacity 1s ease';
    div.style.opacity='0';
    setTimeout(()=>div.remove(),1000);
  }, 8000);
}

// ══ PRESENZA BAR ═══════════════════════════════
function updatePresenceBar() {
  const bar = document.getElementById('presence-bar');
  const all = [{name:ME.name,isMe:true}, ...Array.from(otherUsers.values()).map(u=>({name:u.name,isMe:false}))];
  bar.innerHTML = all.map(u=>`
    <div class="presence-dot">
      <div class="presence-avatar-mini" style="background:rgba(212,168,83,.15);display:flex;align-items:center;justify-content:center;font-family:serif;font-size:12px;color:rgba(212,168,83,.7);">
        ${(u.name||'?')[0].toUpperCase()}
      </div>
      <span class="presence-name ${u.isMe?'presence-you':''}">${u.name}${u.isMe?' (tu)':''}</span>
    </div>
  `).join('');
}

// ══ TOAST ═══════════════════════════════════════
function showToast(text) {
  const container = document.getElementById('join-toast');
  const el = document.createElement('div');
  el.className='toast'; el.textContent=text;
  container.innerHTML='';
  container.appendChild(el);
  setTimeout(()=>container.innerHTML='',3500);
}

// ══ OROLOGIO ════════════════════════════════════
function updateClock(t) {
  const h=Math.floor(t*24), m=Math.floor((t*24-h)*60);
  const icon = t<.12?'🌅':t<.5?'☀️':t<.62?'🌇':'🌙';
  document.getElementById('world-clock').textContent =
    `${icon} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ══ PROFILO PROPRIO ════════════════════════════
function openMyProfile() {
  window.parent?.postMessage({type:'OPEN_PROFILE'},'*');
}
