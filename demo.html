<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sekai</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap');

:root{
  --font-serif:'Cormorant Garamond',serif;
  --font-jp:'Zen Kaku Gothic New',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}

/* ══ INTRO ══ */
#intro{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:opacity 2.5s ease;
}

#bg-video{
  position:absolute;
  top:-4%;left:-4%;
  width:108%;height:108%;
  object-fit:cover;z-index:0;
  /* Blur leggero che ammorbidisce la sgranatura
     e dà effetto pittorico/acquerello */
  filter:
    blur(1.2px)
    saturate(1.35)
    contrast(1.08)
    brightness(1.05);
  /* Scale per coprire i bordi del blur */
  transform:scale(1.06);
  transform-origin:center;
  /* Rendering pittorico su mobile */
  image-rendering:auto;
  will-change:transform;
}

#intro canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:1;pointer-events:none;
}

/* Overlay: scurisce leggermente i bordi, lascia il centro pulito */
#intro-overlay{
  position:absolute;inset:0;z-index:2;
  background:radial-gradient(ellipse 80% 70% at 50% 50%,
    rgba(0,0,0,0) 0%,
    rgba(0,0,0,0.08) 60%,
    rgba(0,0,0,0.42) 100%
  );
}

/* Contenuto */
.ic{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  gap:18px;
  /* Posizionato in basso al centro */
  position:absolute;
  bottom:12%;left:50%;transform:translateX(-50%);
  text-align:center;
  width:100%;
}

/* Kanji grande */
.logo-jp{
  font-family:var(--font-jp);
  font-size:clamp(52px,8vw,96px);
  font-weight:300;
  color:rgba(255,255,255,0.92);
  letter-spacing:.5em;
  text-indent:.5em;
  text-shadow:
    0 2px 12px rgba(0,0,0,0.35),
    0 0 80px rgba(255,245,220,0.2);
  animation:fadeUp 2s ease both;
}

/* Sottotitolo romano */
.logo-sub{
  font-family:var(--font-serif);
  font-size:clamp(10px,1.2vw,14px);
  font-weight:300;
  color:rgba(255,255,255,0.55);
  letter-spacing:.75em;
  text-indent:.75em;
  text-shadow:0 1px 6px rgba(0,0,0,0.4);
  animation:fadeUp 2s .3s ease both;
}

/* Invito a entrare */
.enter-hint{
  display:flex;align-items:center;gap:16px;
  margin-top:8px;
  animation:fadeUp 2s .7s ease both, pulse 3s 2.7s ease-in-out infinite;
}

.enter-line{
  display:block;width:40px;height:1px;
  background:rgba(255,255,255,0.35);
}

.enter-text{
  font-family:var(--font-serif);
  font-style:italic;
  font-size:clamp(11px,1.3vw,15px);
  color:rgba(255,255,255,0.6);
  letter-spacing:.25em;
  text-shadow:0 1px 6px rgba(0,0,0,0.4);
  white-space:nowrap;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes pulse{
  0%,100%{opacity:.7;}
  50%{opacity:1;}
}
@keyframes lf{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bp{0%,100%{opacity:.8}50%{opacity:1}}
@keyframes tipf{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}

/* ══ WORLD ══ */
#world{position:fixed;inset:0;display:none;}
#wc{position:absolute;inset:0;width:100%;height:100%;}
#hud{position:absolute;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:linear-gradient(to bottom,rgba(0,0,0,.3),transparent);pointer-events:none;}
.hclock{font-family:var(--font-serif);font-size:13px;color:rgba(245,234,208,.8);letter-spacing:.15em;}
.haname{font-family:var(--font-serif);font-style:italic;font-size:clamp(12px,1.4vw,16px);color:rgba(245,234,208,.7);letter-spacing:.2em;}
.hctrl{display:flex;gap:10px;pointer-events:all;}
.cb{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.15);border-radius:50%;width:36px;height:36px;font-size:15px;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.cb:hover{background:rgba(212,168,83,.2);border-color:rgba(212,168,83,.6);transform:scale(1.1);}
#nav{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:50;}
.na{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.2);border-radius:50%;width:44px;height:44px;font-size:22px;color:rgba(245,234,208,.7);cursor:pointer;transition:all .3s;backdrop-filter:blur(4px);}
.na:hover{background:rgba(212,168,83,.2);border-color:rgba(212,168,83,.6);color:#f5ead0;transform:scale(1.1);}
#map{position:fixed;inset:0;z-index:500;background:rgba(13,10,20,.88);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;}
#mp{background:rgba(18,14,32,.97);border:1px solid rgba(212,168,83,.3);padding:36px;max-width:660px;width:90%;text-align:center;}
#mp h2{font-family:'Cormorant Garamond',serif;font-size:26px;color:#d4a853;letter-spacing:.3em;margin-bottom:28px;font-weight:300;}
#mg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.ma{background:rgba(255,255,255,.04);border:1px solid rgba(212,168,83,.2);padding:16px 8px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:7px;}
.ma:hover{background:rgba(212,168,83,.12);border-color:rgba(212,168,83,.6);transform:translateY(-2px);}
.mi{font-size:26px;}
.ml{font-family:'Cormorant Garamond',serif;font-size:10px;color:rgba(245,234,208,.65);letter-spacing:.12em;text-align:center;line-height:1.4;}
#mc{background:transparent;border:1px solid rgba(212,168,83,.4);color:rgba(245,234,208,.6);font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.2em;padding:10px 28px;cursor:pointer;transition:all .3s;}
#mc:hover{border-color:rgba(212,168,83,.8);color:#f5ead0;}
#tr{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;pointer-events:none;background:transparent;transition:background 1s ease;}
#tr.f{background:rgba(13,10,20,.95);}
#tt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(16px,2.5vw,28px);color:#d4a853;letter-spacing:.4em;opacity:0;text-shadow:0 0 40px rgba(212,168,83,.4);transition:opacity .8s ease;}
#tr.f #tt{opacity:1;}
#tip{position:absolute;bottom:82px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:rgba(245,234,208,.4);letter-spacing:.2em;z-index:50;pointer-events:none;animation:tipf 3s ease-in-out infinite;transition:opacity 1.5s;}
@media(max-width:600px){#mg{grid-template-columns:repeat(2,1fr);}.ma:nth-child(5){grid-column:span 1;}}

/* ══ TOUCH GATE ══ */
#touch-gate {
  position:absolute;inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.18);
  transition:opacity 1.2s ease;
  cursor:pointer;
}
#touch-gate.hidden {
  opacity:0;pointer-events:none;
}
#touch-gate-inner {
  display:flex;flex-direction:column;align-items:center;gap:14px;
  position:relative;
}
.touch-ripple {
  position:absolute;
  width:90px;height:90px;
  border:1.5px solid rgba(255,255,255,0.5);
  border-radius:50%;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  animation:ripple 2.4s ease-out infinite;
}
.touch-ripple-2 {
  animation-delay:1.2s;
}
@keyframes ripple {
  0%   { width:60px;height:60px;opacity:0.8; }
  100% { width:160px;height:160px;opacity:0; }
}
.touch-icon {
  font-size:32px;color:rgba(255,255,255,0.85);
  text-shadow:0 0 20px rgba(255,255,255,0.4);
  animation:iconPulse 2s ease-in-out infinite;
  position:relative;z-index:1;
}
@keyframes iconPulse {
  0%,100%{transform:scale(1);opacity:0.8;}
  50%{transform:scale(1.12);opacity:1;}
}
.touch-label {
  font-family:var(--font-serif);
  font-style:italic;
  font-size:clamp(12px,1.4vw,16px);
  color:rgba(255,255,255,0.65);
  letter-spacing:.3em;
  text-shadow:0 1px 8px rgba(0,0,0,0.5);
  animation:fadeUp 1.5s ease both;
}

/* Main content fade in after touch */
#main-ic {
  transition: opacity 1.5s ease 0.3s;
}
#main-ic.visible {
  opacity:1 !important;
  pointer-events:all !important;
}
</style>
</head>
<body>

<div id="intro">
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>
  <canvas id="ic"></canvas>
  <div id="intro-overlay"></div>
  <!-- Overlay tocco iniziale -->
  <div id="touch-gate">
    <div id="touch-gate-inner">
      <div class="touch-ripple"></div>
      <div class="touch-ripple touch-ripple-2"></div>
      <div class="touch-icon">✦</div>
      <p class="touch-label">tocca per iniziare</p>
    </div>
  </div>
  <!-- Contenuto principale (nascosto finché non si tocca) -->
  <div class="ic" id="main-ic" style="opacity:0;pointer-events:none;">
    <div class="logo-jp">世界</div>
    <p class="logo-sub">S E K A I</p>
    <div class="enter-hint">
      <span class="enter-line"></span>
      <span class="enter-text">entra nel mondo</span>
      <span class="enter-line"></span>
    </div>
  </div>
</div>

<div id="world">
  <canvas id="wc"></canvas>
  <div id="hud">
    <div class="hclock"><span id="ci">🌅</span> <span id="ct"></span></div>
    <div class="haname" id="an"></div>
    <div class="hctrl">
      <button class="cb" id="sb" onclick="toggleSound()" title="Suoni">🔇</button>
      <button class="cb" id="mb" onclick="toggleMusic()" title="Musica" style="opacity:.5">🎵</button>
      <button class="cb" onclick="openMap()" title="Mappa">🗺️</button>
    </div>
  </div>
  <div id="nav">
    <button class="na" onclick="navArea(-1)">‹</button>
    <button class="na" onclick="navArea(1)">›</button>
  </div>
  <div id="tip">← usa le frecce per esplorare →</div>
</div>

<div id="map">
  <div id="mp">
    <h2>Mappa di Sekai</h2>
    <div id="mg">
      <div class="ma" onclick="travelTo('village')"><div class="mi">🏘️</div><div class="ml">Villaggio Centrale</div></div>
      <div class="ma" onclick="travelTo('forest')"><div class="mi">🌲</div><div class="ml">Foresta dei Sogni</div></div>
      <div class="ma" onclick="travelTo('lake')"><div class="mi">🌙</div><div class="ml">Lago della Luna</div></div>
      <div class="ma" onclick="travelTo('library')"><div class="mi">📚</div><div class="ml">Biblioteca delle Storie</div></div>
      <div class="ma" onclick="travelTo('hill')"><div class="mi">⭐</div><div class="ml">Collina delle Stelle</div></div>
      <div class="ma" onclick="travelTo('port')"><div class="mi">⛵</div><div class="ml">Porto delle Avventure</div></div>
      <div class="ma" onclick="travelTo('garden')"><div class="mi">🌸</div><div class="ml">Giardino della Serenità</div></div>
    </div>
    <button id="mc" onclick="closeMap()">✕ Chiudi</button>
  </div>
</div>

<div id="tr"><div id="tt"></div></div>

<script>
// ── STATO ──────────────────────────────────────
const S={
  soundOn:false,musicOn:false,
  area:'village',areaIdx:0,transitioning:false,
  wt:0.08,speed:0.00012,frame:0,
  areas:['village','forest','lake','library','hill','port','garden'],
  mouse:{x:0,y:0},
};

const AREAS={
  village:{name:'Villaggio Centrale',tagline:'Dove ogni porta è un benvenuto',sky:['#fde8c8','#f0956e','#1a1428','#0d0a20'],ground:'#7a9a68'},
  forest:{name:'Foresta dei Sogni',tagline:'Dove gli alberi custodiscono segreti antichi',sky:['#c8e8d8','#7ab89a','#0d1e14','#081410'],ground:'#4a7a42'},
  lake:{name:'Lago della Luna',tagline:'Dove l\'acqua riflette i sogni del cielo',sky:['#c8d8f0','#8a9ecf','#1a1a40','#10103a'],ground:'#4a7a8a'},
  library:{name:'Biblioteca delle Storie',tagline:'Dove ogni libro è una porta verso altrove',sky:['#e8d8c0','#c4a87a','#2a1a0a','#1a0e06'],ground:'#8a7060'},
  hill:{name:'Collina delle Stelle',tagline:'Dove il cielo scende a toccare la terra',sky:['#2a1a50','#1a0e34','#04040e','#020208'],ground:'#2a3a20'},
  port:{name:'Porto delle Avventure',tagline:'Dove ogni onda porta storie lontane',sky:['#f0c880','#e89050','#1a0e08','#100a04'],ground:'#4a7090'},
  garden:{name:'Giardino della Serenità',tagline:'Dove ogni fiore è una preghiera silenziosa',sky:['#f8e8f0','#e8c0d8','#3a1a30','#281428'],ground:'#7aaa70'},
};

// ── CANVAS ─────────────────────────────────────
let IC,IX,WC,WX,W,H;
let birds=[],clouds=[],stars=[],leaves=[],fireflies=[],flowers=[],meteors=[],butterflies=[],particles=[];

// ── AUDIO ──────────────────────────────────────
let AC=null,snd={};
function initAC(){if(AC)return;AC=new(window.AudioContext||window.webkitAudioContext)();}
function mkNoise(freq,q,gain){
  const buf=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const src=AC.createBufferSource();src.buffer=buf;src.loop=true;
  const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=freq;f.Q.value=q;
  const g=AC.createGain();g.gain.value=gain;
  src.connect(f);f.connect(g);g.connect(AC.destination);src.start();
  return{src,gain:g};
}
function toggleSound(){
  S.soundOn=!S.soundOn;
  document.getElementById('sb').textContent=S.soundOn?'🔊':'🔇';
  if(S.soundOn){
    initAC();
    snd.wind=mkNoise(350,.5,.04);
    snd.water=mkNoise(600,.3,.03);
    const osc=AC.createOscillator();osc.type='square';osc.frequency.value=3800;
    const cg=AC.createGain();cg.gain.value=0;
    const lfo=AC.createOscillator();lfo.type='sine';lfo.frequency.value=8;
    const lg=AC.createGain();lg.gain.value=.01;
    lfo.connect(lg);lg.connect(cg.gain);osc.connect(cg);cg.connect(AC.destination);
    osc.start();lfo.start();snd.crickets={osc,gain:cg,lfo};
  }else{
    if(snd.wind){snd.wind.src.stop();snd.wind=null;}
    if(snd.water){snd.water.src.stop();snd.water=null;}
    if(snd.crickets){snd.crickets.osc.stop();snd.crickets=null;}
  }
}
function toggleMusic(){
  S.musicOn=!S.musicOn;
  const mb=document.getElementById('mb');mb.style.opacity=S.musicOn?'1':'.5';
  if(S.musicOn){
    initAC();
    const notes=[261.63,329.63,392,523.25];
    const mg=AC.createGain();mg.gain.value=.06;mg.connect(AC.destination);
    const rv=AC.createConvolver();
    const rb=AC.createBuffer(2,AC.sampleRate*3,AC.sampleRate);
    for(let c=0;c<2;c++){const d=rb.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);}
    rv.buffer=rb;rv.connect(mg);
    snd.music={oscs:notes.map(n=>{const o=AC.createOscillator();o.type='sine';o.frequency.value=n;const g=AC.createGain();g.gain.value=.015;o.connect(g);g.connect(rv);o.start();return{o,g};}),mg};
  }else{
    if(snd.music){snd.music.oscs.forEach(o=>o.o.stop());snd.music=null;}
  }
}

// ── INTRO ──────────────────────────────────────
// ── INTRO ENGINE ──────────────────────────────
// Struttura a livelli parallax per profondità reale
// 7 layer: cielo, nuvole, montagne, colline lontane, colline medie, prato, primo piano

const iClouds = [];
const iFlowers = [];
const iBirds = [];
const iPetals = [];
let it = 0;

function initIntro(){
  IC = document.getElementById('ic');
  if(!IC) return;
  IX = IC.getContext('2d');
  W = IC.width = window.innerWidth;
  H = IC.height = window.innerHeight;

  // Solo effetti overlay: petali, particelle, lucciole leggere
  iFlowers.length = 0; // non servono sul video
  iBirds.length = 0;
  iPetals.length = 0;

  animIntro();
}


function animIntro(){
  it += 0.006;
  const ctx = IX, w = W, h = H;
  ctx.clearRect(0, 0, w, h);

  // ── PETALI CHE VOLANO ──
  if(Math.random() < 0.06) iPetals.push({
    x: Math.random()*w,
    y: -10,
    vx: (Math.random()-.5)*1.2,
    vy: 0.4+Math.random()*0.8,
    rot: Math.random()*Math.PI*2,
    rsp: (Math.random()-.5)*.08,
    a: 0.7+Math.random()*.3,
    col: Math.random()<.6 ? '#ffb7c5' : Math.random()<.5 ? '#ffd060' : '#ffffff',
    sz: 4+Math.random()*6,
  });

  iPetals.forEach((p,i) => {
    p.x += p.vx + Math.sin(it*1.2+i*.4)*.6;
    p.y += p.vy;
    p.rot += p.rsp;
    p.a -= 0.0025;
    if(p.a <= 0 || p.y > h+20){ iPetals.splice(i,1); return; }
    ctx.save();
    ctx.globalAlpha = p.a;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    // Petalo con gradiente
    const pg = ctx.createRadialGradient(0,0,0,0,0,p.sz);
    pg.addColorStop(0, p.col);
    pg.addColorStop(1, p.col+'44');
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.sz, p.sz*0.55, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // ── PARTICELLE LUMINOSE (lucciole leggere) ──
  if(Math.random() < 0.04) iPetals.push({
    x: Math.random()*w,
    y: h*0.5+Math.random()*h*0.4,
    vx: (Math.random()-.5)*.3,
    vy: -(0.2+Math.random()*.4),
    rot: 0, rsp: 0,
    a: 0.5+Math.random()*.4,
    col: '#fffaaa',
    sz: 1.5+Math.random()*2,
    glow: true,
  });

  // Glow particles separati
  iPetals.forEach((p,i) => {
    if(!p.glow) return;
    p.x += p.vx + Math.sin(it+i)*.3;
    p.y += p.vy;
    p.a -= 0.004;
    if(p.a <= 0){ iPetals.splice(i,1); return; }
    ctx.save();
    ctx.globalAlpha = p.a * (0.5 + 0.5*Math.sin(it*3+i));
    const gg = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz*5);
    gg.addColorStop(0,'rgba(255,250,180,0.9)');
    gg.addColorStop(1,'transparent');
    ctx.fillStyle = gg;
    ctx.fillRect(p.x-p.sz*5, p.y-p.sz*5, p.sz*10, p.sz*10);
    ctx.restore();
  });

  if(document.getElementById('intro') && document.getElementById('intro').style.opacity !== '0')
    requestAnimationFrame(animIntro);
}


// ── MUSICA ALLEGRA STILE ANIME ─────────────────
let ambientStarted = false;

function startAmbientMusic() {
  if(ambientStarted) return;
  ambientStarted = true;
  if(!AC) AC = new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') { AC.resume().then(()=>buildMusic()); return; }
  buildMusic();
}

function buildMusic() {
  if(!AC) return;

  // Master gain con fade-in
  const master = AC.createGain();
  master.gain.setValueAtTime(0, AC.currentTime);
  master.gain.linearRampToValueAtTime(0.88, AC.currentTime+3.5);
  master.connect(AC.destination);

  // Riverbero medio (stanza aperta, non troppo lungo)
  const rev = AC.createConvolver();
  const rLen = AC.sampleRate*3;
  const rBuf = AC.createBuffer(2,rLen,AC.sampleRate);
  for(let c=0;c<2;c++){const d=rBuf.getChannelData(c);for(let i=0;i<rLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rLen,2);}
  rev.buffer=rBuf;
  const revG=AC.createGain(); revG.gain.value=0.38; rev.connect(revG); revG.connect(master);
  const dry=AC.createGain(); dry.gain.value=0.62; dry.connect(master);

  // ── SCALA: Do maggiore (allegra, solare) ──
  // Do Re Mi Fa Sol La Si Do (ottave 4 e 5)
  const C4=261.63,D4=293.66,E4=329.63,F4=349.23,G4=392,A4=440,B4=493.88;
  const C5=523.25,D5=587.33,E5=659.25,F5=698.46,G5=784,A5=880,B5=987.77;
  const C3=130.81,G3=196,E3=164.81;

  // ── FUNZIONE: nota con timbro specifico ──
  function note(freq, time, dur, vol, type='sine', detune=0) {
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.frequency.value=freq;
    if(detune) o.detune.value=detune;
    g.gain.setValueAtTime(0,time);
    g.gain.linearRampToValueAtTime(vol, time+Math.min(0.04,dur*0.1));
    g.gain.setValueAtTime(vol*0.75, time+dur*0.6);
    g.gain.linearRampToValueAtTime(0, time+dur);
    o.connect(g); g.connect(dry); g.connect(rev);
    o.start(time); o.stop(time+dur+0.05);
  }

  // Koto pizzicato (attacco rapido, decay esponenziale)
  function koto(freq, time, vol=0.1) {
    const o=AC.createOscillator(), o2=AC.createOscillator(), g=AC.createGain();
    o.type='triangle'; o.frequency.value=freq;
    o2.type='sine'; o2.frequency.value=freq*2.003;
    const g2=AC.createGain(); g2.gain.value=0.28; o2.connect(g2); g2.connect(g);
    g.gain.setValueAtTime(vol,time);
    g.gain.exponentialRampToValueAtTime(vol*0.3, time+0.15);
    g.gain.exponentialRampToValueAtTime(0.0001, time+1.8);
    o.connect(g); g.connect(dry); g.connect(rev);
    o.start(time); o.stop(time+2);
    o2.start(time); o2.stop(time+2);
  }

  // Flauto anime (shakuhachi veloce, allegro)
  function flute(freq, time, dur, vol=0.06) {
    const o=AC.createOscillator(), g=AC.createGain();
    const vib=AC.createOscillator(), vibG=AC.createGain();
    o.type='sine'; o.frequency.value=freq;
    vib.type='sine'; vib.frequency.value=6.5;
    vibG.gain.value=freq*0.015;
    vib.connect(vibG); vibG.connect(o.frequency);
    // Breath noise
    const noise=AC.createOscillator();
    noise.type='sawtooth'; noise.frequency.value=freq*0.5;
    const nG=AC.createGain(); nG.gain.value=vol*0.08;
    noise.connect(nG); nG.connect(g);
    g.gain.setValueAtTime(0,time);
    g.gain.linearRampToValueAtTime(vol,time+0.06);
    g.gain.setValueAtTime(vol,time+dur-0.12);
    g.gain.linearRampToValueAtTime(0,time+dur);
    o.connect(g); g.connect(dry); g.connect(rev);
    o.start(time); o.stop(time+dur+0.1);
    vib.start(time); vib.stop(time+dur+0.1);
    noise.start(time); noise.stop(time+dur+0.1);
  }

  // Percussione (taiko leggero)
  function taiko(time, vol=0.12) {
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(180,time);
    o.frequency.exponentialRampToValueAtTime(60,time+0.15);
    g.gain.setValueAtTime(vol,time);
    g.gain.exponentialRampToValueAtTime(0.0001,time+0.25);
    o.connect(g); g.connect(dry);
    o.start(time); o.stop(time+0.3);
    // Rim
    const o2=AC.createOscillator(), g2=AC.createGain();
    o2.type='square'; o2.frequency.value=900;
    g2.gain.setValueAtTime(vol*0.3,time);
    g2.gain.exponentialRampToValueAtTime(0.0001,time+0.04);
    o2.connect(g2); g2.connect(dry);
    o2.start(time); o2.stop(time+0.05);
  }

  // Carillon / glockenspiel (note brillanti)
  function bell(freq, time, vol=0.07) {
    [1,2.756,5.404].forEach((harm,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type='sine'; o.frequency.value=freq*harm;
      const v=vol*[1,.4,.1][i];
      g.gain.setValueAtTime(v,time);
      g.gain.exponentialRampToValueAtTime(0.0001,time+[2.5,1.2,.6][i]);
      o.connect(g); g.connect(rev); g.connect(dry);
      o.start(time); o.stop(time+3);
    });
  }

  // ── COMPOSIZIONE: loop da 16 battute (allegro, 120 BPM) ──
  const BPM=112, beat=60/BPM, bar=beat*4;

  function playLoop() {
    const t = AC.currentTime + 0.05;

    // ── BASSO (accordi) ──
    [[C3,0],[G3,2],[C3,4],[E3,6],[G3,8],[C3,10],[G3,12],[E3,14]].forEach(([f,b])=>{
      note(f, t+b*beat, beat*1.8, 0.06, 'sine');
    });

    // ── KOTO (melodia principale — allegra) ──
    // Frase 1
    [
      [E4,0],[G4,.5],[A4,1],[G4,1.5],[E4,2],[D4,2.5],[C4,3],[D4,3.5],
      [E4,4],[E4,4.5],[E4,5],[D4,5.5],[D4,6],[E4,6.5],[G4,7],[A4,7.5],
    ].forEach(([f,b])=> koto(f, t+b*beat, 0.11));
    // Frase 2
    [
      [C5,8],[B4,8.5],[A4,9],[G4,9.5],[E4,10],[G4,10.5],[A4,11],[C5,11.5],
      [D5,12],[C5,12.5],[B4,13],[A4,13.5],[G4,14],[E4,14.5],[D4,15],[C4,15.5],
    ].forEach(([f,b])=> koto(f, t+b*beat, 0.11));

    // ── FLAUTO (controcanto) ──
    [
      [G5,2,beat*1.5],[E5,4,beat],[G5,5,beat*.5],[A5,6,beat*1.8],
      [G5,9,beat],[E5,10,beat*1.2],[D5,12,beat*.8],[E5,13,beat*.6],[C5,14,beat*2],
    ].forEach(([f,b,d])=> flute(f, t+b*beat, d, 0.055));

    // ── CARILLON (ornamenti) ──
    [1,3,5,7,9,11,13,15].forEach(b=>{
      if(Math.random()<0.5) {
        const notes2=[C5,D5,E5,G5,A5];
        bell(notes2[Math.floor(Math.random()*notes2.length)], t+b*beat+Math.random()*beat*.5, 0.05);
      }
    });

    // ── TAIKO (ritmo) ──
    [0,2,4,6,8,10,12,14].forEach(b=> taiko(t+b*beat, 0.1));
    // Accenti off-beat
    [1,5,9,13].forEach(b=> taiko(t+b*beat+beat*.5, 0.06));

    // Ripeti
    setTimeout(playLoop, bar*16*1000 - 100);
  }
  playLoop();

  // ── SUONI NATURA ──

  // Vento (rumore bianco filtrato, ondeggiante)
  const wBuf=AC.createBuffer(1,AC.sampleRate*4,AC.sampleRate);
  const wd=wBuf.getChannelData(0); for(let i=0;i<wd.length;i++) wd[i]=Math.random()*2-1;
  const wSrc=AC.createBufferSource(); wSrc.buffer=wBuf; wSrc.loop=true;
  const wFilt=AC.createBiquadFilter(); wFilt.type='bandpass'; wFilt.frequency.value=400; wFilt.Q.value=0.5;
  const wGain=AC.createGain(); wGain.gain.value=0;
  wSrc.connect(wFilt); wFilt.connect(wGain); wGain.connect(master);
  wSrc.start();
  // Vento ondeggiante
  const lfo=AC.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.08;
  const lfoG=AC.createGain(); lfoG.gain.value=0.015;
  lfo.connect(lfoG); lfoG.connect(wGain.gain); lfo.start();
  wGain.gain.setValueAtTime(0,AC.currentTime);
  wGain.gain.linearRampToValueAtTime(0.02,AC.currentTime+4);

  // Ruscello (rumore basso continuo)
  const rSrc=AC.createBufferSource(); rSrc.buffer=wBuf; rSrc.loop=true;
  const rFilt=AC.createBiquadFilter(); rFilt.type='lowpass'; rFilt.frequency.value=800;
  const rGain=AC.createGain(); rGain.gain.value=0;
  rSrc.connect(rFilt); rFilt.connect(rGain); rGain.connect(master);
  rSrc.start();
  rGain.gain.setValueAtTime(0,AC.currentTime);
  rGain.gain.linearRampToValueAtTime(0.025,AC.currentTime+5);
  // Gorgoglio ruscello (LFO veloce)
  const rLfo=AC.createOscillator(); rLfo.type='sine'; rLfo.frequency.value=7;
  const rLfoG=AC.createGain(); rLfoG.gain.value=0.01;
  rLfo.connect(rLfoG); rLfoG.connect(rGain.gain); rLfo.start();

  // Uccelli (allegri, frequenti di giorno)
  function bird() {
    if(!ambientStarted) return;
    const numChirps = 1 + Math.floor(Math.random()*3);
    for(let c=0;c<numChirps;c++) {
      const delay = c*0.18;
      const f = 2000+Math.random()*1800;
      const o=AC.createOscillator(), g=AC.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(f, AC.currentTime+delay);
      o.frequency.linearRampToValueAtTime(f*(1.15+Math.random()*.2), AC.currentTime+delay+0.04);
      o.frequency.linearRampToValueAtTime(f*0.92, AC.currentTime+delay+0.12);
      g.gain.setValueAtTime(0,AC.currentTime+delay);
      g.gain.linearRampToValueAtTime(0.022,AC.currentTime+delay+0.01);
      g.gain.linearRampToValueAtTime(0,AC.currentTime+delay+0.14);
      o.connect(g); g.connect(rev); g.connect(dry);
      o.start(AC.currentTime+delay); o.stop(AC.currentTime+delay+0.18);
    }
    setTimeout(bird, 1500+Math.random()*4000);
  }
  setTimeout(bird, 500);

  // Grilli leggeri (sottofondo sempre)
  const cricketOsc=AC.createOscillator();
  cricketOsc.type='square'; cricketOsc.frequency.value=4200;
  const cricketG=AC.createGain(); cricketG.gain.value=0;
  const cricketLfo=AC.createOscillator(); cricketLfo.type='sine'; cricketLfo.frequency.value=12;
  const cricketLfoG=AC.createGain(); cricketLfoG.gain.value=0.004;
  cricketLfo.connect(cricketLfoG); cricketLfoG.connect(cricketG.gain);
  cricketOsc.connect(cricketG); cricketG.connect(master);
  cricketOsc.start(); cricketLfo.start();
  cricketG.gain.setValueAtTime(0,AC.currentTime);
  cricketG.gain.linearRampToValueAtTime(0.006,AC.currentTime+6);

  document.getElementById('sb').textContent='🔊';
}

// ── INIT ───────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initIntro();

  const gate = document.getElementById('touch-gate');
  const mainIc = document.getElementById('main-ic');
  let touched = false;

  function onFirstTouch(e) {
    if(touched) return;
    touched = true;
    if(e) e.preventDefault();

    // Crea AudioContext nel gestore del tocco (obbligatorio browser)
    if(!AC) AC = new(window.AudioContext||window.webkitAudioContext)();

    const go = () => {
      buildMusic();
      // Avvia video
      const vid = document.getElementById('bg-video');
      if(vid) vid.play().catch(()=>{});
      // Nascondi gate, mostra contenuto
      gate.classList.add('hidden');
      setTimeout(()=>{
        gate.style.display='none';
        mainIc.classList.add('visible');
      }, 1200);
    };

    if(AC.state==='suspended') AC.resume().then(go); else go();
  }

  gate.addEventListener('click', onFirstTouch);
  gate.addEventListener('touchend', onFirstTouch, {passive:false});

  // Click sul contenuto principale — entra nel mondo
  mainIc.addEventListener('click', enterWorld);
  mainIc.addEventListener('touchend', (e)=>{ e.preventDefault(); enterWorld(); }, {passive:false});

  window.addEventListener('resize', ()=>{
    W=window.innerWidth; H=window.innerHeight;
    if(IC){IC.width=W;IC.height=H;}
    if(WC){WC.width=W;WC.height=H;}
  });
});

</script>
